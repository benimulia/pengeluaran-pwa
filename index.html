<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>Pencatat Pengeluaran Harian</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="glass-header">
            <h1>Dompetku</h1>
            <p>Total Pengeluaran</p>
            <h2 id="total-expenses">Rp 0</h2>
        </header>

        <main>
            <section class="chart-section glass-card" id="chart-container" style="display: none;">
                <h3>Distribusi Kategori</h3>
                <div style="position: relative; height: 250px; width: 100%;">
                    <canvas id="expenseChart"></canvas>
                </div>
            </section>
            <br>
            <section class="form-section glass-card">
                <h3>Tambah Pengeluaran Baru</h3>
                <form id="expense-form">
                    <div class="input-group">
                        <label for="date">Tanggal</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="input-group">
                        <label for="category">Kategori</label>
                        <select id="category" required>
                            <option value="" disabled selected>Pilih Kategori</option>
                            <option value="Makanan & Minuman">Makanan & Minuman</option>
                            <option value="Transportasi">Transportasi</option>
                            <option value="Tagihan & Utilitas">Tagihan & Utilitas</option>
                            <option value="Belanja">Belanja</option>
                            <option value="Hiburan">Hiburan</option>
                            <option value="Kesehatan">Kesehatan</option>
                            <option value="Pendidikan">Pendidikan</option>
                            <option value="Sedekah & Donasi">Sedekah & Donasi</option>
                            <option value="Lain-lain">Lain-lain</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="amount">Nominal (Rp)</label>
                        <input type="number" id="amount" placeholder="Contoh: 50000" min="0" required>
                    </div>
                    <div class="input-group">
                        <label for="desc">Keterangan Singkat</label>
                        <input type="text" id="desc" placeholder="Contoh: Nasi Goreng Spesial" required>
                    </div>
                    <button type="submit" class="btn-primary">Tambah Catatan</button>
                </form>
            </section>

            <section class="list-section">
                <div class="list-header">
                    <h3>Riwayat Pengeluaran</h3>
                </div>

                <div class="filter-group glass-card">
                    <div class="date-filters">
                        <div class="input-group-filter">
                            <label for="filter-start">Dari</label>
                            <input type="date" id="filter-start">
                        </div>
                        <div class="input-group-filter">
                            <label for="filter-end">Sampai</label>
                            <input type="date" id="filter-end">
                        </div>
                    </div>
                    <select id="filter-category" class="filter-dropdown">
                        <option value="Semua">Semua Kategori</option>
                        <option value="Makanan & Minuman">Makanan & Minuman</option>
                        <option value="Transportasi">Transportasi</option>
                        <option value="Tagihan & Utilitas">Tagihan & Utilitas</option>
                        <option value="Belanja">Belanja</option>
                        <option value="Hiburan">Hiburan</option>
                        <option value="Kesehatan">Kesehatan</option>
                        <option value="Pendidikan">Pendidikan</option>
                        <option value="Sedekah & Donasi">Sedekah & Donasi</option>
                        <option value="Lain-lain">Lain-lain</option>
                    </select>
                </div>

                <div id="expense-list" class="expense-list">
                    <!-- Item pengeluaran akan dimuat di sini oleh JS -->
                </div>
                <div id="empty-state" class="empty-state hidden">
                    Belum ada pengeluaran dicatat.
                </div>
            </section>

            <section class="actions-section">
                <button id="btn-export" class="btn-secondary">Ekspor CSV</button>
                <button id="btn-reset" class="btn-danger">Reset Semua Data</button>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
